[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate-image"]
  external_node_modules = []

[functions."generate-video"]
  external_node_modules = []

[functions."generate-text"]
  external_node_modules = []

[dev]
  command = "npm run dev"
  targetPort = 5173

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
